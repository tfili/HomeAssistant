cabinet_light_lock_acquire:
  alias: Cabinet Light - Acquire Lock
  description: Acquires the cabinet light mutex lock. Waits up to 12 seconds, auto-releases stale locks after 60 seconds.
  sequence:
  - repeat:
      until:
      - condition: template
        value_template: '{{ not is_state("input_boolean.cabinet_light_lock", "on") or (as_timestamp(now()) - as_timestamp(state_attr("input_datetime.cabinet_light_lock_time", "timestamp") or 0)) > 60 or repeat.index > 12 }}'
      sequence:
      - delay:
          seconds: 1
  - if:
    - condition: template
      value_template: '{{ is_state("input_boolean.cabinet_light_lock", "on") and (as_timestamp(now()) - as_timestamp(state_attr("input_datetime.cabinet_light_lock_time", "timestamp") or 0)) > 60 }}'
    then:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.cabinet_light_lock
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.cabinet_light_lock
  - action: input_datetime.set_datetime
    data:
      datetime: '{{ now().isoformat() }}'
    target:
      entity_id: input_datetime.cabinet_light_lock_time
  mode: single

cabinet_light_lock_release:
  alias: Cabinet Light - Release Lock
  description: Releases the cabinet light mutex lock.
  sequence:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.cabinet_light_lock
  mode: single

close_garage_doors:
  alias: Close Garage Doors
  sequence:
  - parallel:
    - if:
      - condition: state
        entity_id: cover.left_garage_door
        state: open
      then:
      - action: cover.close_cover
        data: {}
        target:
          entity_id: cover.left_garage_door
    - if:
      - condition: state
        entity_id: cover.right_garage_door
        state: open
      then:
      - action: cover.close_cover
        data: {}
        target:
          entity_id: cover.right_garage_door
  mode: single
  icon: mdi:garage
alarm_tasks_no_arm:
  sequence:
  - alias: Do alarm tasks
    event: alarm_tasks_no_arm
    event_data:
      entity_id: alarm_control_panel.abode_alarm
  alias: Alarm tasks without arming
  mode: single
start_vacuum_or_mop:
  alias: Start vacuum or mop
  description: Starts a vacuum or mop. It makes sure it's docked first and waits for
    it to complete
  fields:
    entity_id:
      name: Entity of the vacuum or mop
      description: The entity ID of the cleaning device that should be started
      required: true
      selector:
        entity:
          multiple: false
          filter:
          - domain: vacuum
  sequence:
  - if:
    - condition: template
      value_template: '{{ not is_state(entity_id, ''docked'') }}'
    then:
    - action: vacuum.stop
      data: {}
      target:
        entity_id: '{{ entity_id }}'
    - delay:
        hours: 0
        minutes: 0
        seconds: 10
        milliseconds: 0
    - action: vacuum.return_to_base
      data: {}
      target:
        entity_id: '{{ entity_id }}'
    - wait_for_trigger:
      - trigger: template
        value_template: '{{ is_state(entity_id, ''docked'') }}'
      timeout:
        hours: 0
        minutes: 10
        seconds: 0
        milliseconds: 0
    - if:
      - condition: template
        value_template: '{{ not wait.completed }}'
      then:
      - variables:
          result_value: false
      - action: notify.mobile_app_toms_iphone
        data:
          title: Failed to start
          message: '{{ entity_id }}''s state is {{ states(entity_id) }} and failed
            to dock'
      - stop: Could not start
        response_variable: result_value
      else: []
  - action: vacuum.start
    data: {}
    target:
      entity_id: '{{ entity_id }}'
  - wait_for_trigger:
    - trigger: template
      value_template: '{{ is_state(entity_id, ''docked'') }}'
    timeout:
      hours: 4
      minutes: 0
      seconds: 0
      milliseconds: 0
  - variables:
      result_value: '{{ wait.completed }}'
  - stop: Finished
    response_variable: result_value
  mode: single
  icon: mdi:robot-vacuum
